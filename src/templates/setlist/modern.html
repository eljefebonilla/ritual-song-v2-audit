<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{{BRAND_CSS}}
{{BASE_CSS}}
<style>
  /* Modern: clean, minimal style */
  .header { border-bottom: 1pt solid var(--brand-accent); }
  .header__occasion { font-size: 16pt; font-weight: 400; letter-spacing: 0.5pt; }
  .header__parish { font-size: 6.5pt; letter-spacing: 4pt; }
  .song-row { border-bottom-color: #F0F0F0; }
  .song-row__label { font-size: 7.5pt; }
  .personnel { border-top-width: 1pt; }
</style>
</head>
<body>

<div class="header">
  <div class="header__parish">{{PARISH_NAME}}</div>
  <div class="header__occasion">{{OCCASION_NAME}}</div>
  {{DESIGNATION_HTML}}
  <div class="header__meta">{{DATE}} &bull; {{MASS_TIME}} &bull; {{ENSEMBLE}}</div>
</div>

<table class="songs">
{{SONG_ROWS}}
</table>

{{PERSONNEL_HTML}}

{{SAFETY_HTML}}

<div class="footer">{{PARISH_NAME}} &bull; Generated by Ritual Song &bull; {{DATE}}</div>

</body>
</html>
