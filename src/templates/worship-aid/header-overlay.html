<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@page { size: letter; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.banner {
  width: 8.5in;
  height: 0.55in;
  background: {{BANNER_COLOR}};
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 0.5in;
}
.banner__title {
  font-family: {{HEADING_FONT}};
  font-size: 11pt;
  font-weight: 700;
  color: white;
  text-align: center;
  flex: 1;
}
.banner__parish {
  font-family: {{BODY_FONT}};
  font-size: 7pt;
  color: rgba(255, 255, 255, 0.7);
  text-align: right;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="banner">
  <div class="banner__title">{{SONG_TITLE}}</div>
  <div class="banner__parish">{{PARISH_NAME}}</div>
</div>

</body>
</html>
